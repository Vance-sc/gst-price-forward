name: Update forward-buy dashboard

# Runs every weekday evening (after USDA's PM boxed-beef report, published
# ~2:45pm Central) and can be triggered by hand from the Actions tab.
# Publishes index.html + data.json to GitHub Pages.
#
# No secrets required — the LMR DataMart is a keyless public API.
on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC = 4-5pm Central, after the PM report
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dashboard
        env:
          PUBLIC_BUILD: "1"   # strip GST's confidential $/margin figures from the public site
        run: |
          pip install matplotlib --quiet
          python generate.py
          python make_board_pdf.py
          mkdir -p public
          cp index.html public/index.html
          cp data.json  public/data.json
          cp board.pdf  public/board.pdf
          cp board_data.json public/board_data.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Mirrors the same build to board.gstmeat.com (SiteGround hosting,
      # password-protected via Site Tools > Protected URLs). Requires repo
      # secrets SG_FTP_HOST / SG_FTP_USER / SG_FTP_PASS — the FTP account
      # should be scoped to the subdomain's document root so the build
      # lands at "/" and the credential can't touch the rest of the site.
      # Skips quietly until the secrets exist.
      - name: Deploy to board.gstmeat.com (SiteGround FTPS)
        env:
          FTP_HOST: ${{ secrets.SG_FTP_HOST }}
          FTP_USER: ${{ secrets.SG_FTP_USER }}
          FTP_PASS: ${{ secrets.SG_FTP_PASS }}
        run: |
          if [ -z "$FTP_HOST" ]; then
            echo "SiteGround FTP secrets not configured — skipping subdomain deploy."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$FTP_USER","$FTP_PASS" \
            -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; \
                mirror -R --delete --verbose public/ /; quit" \
            "$FTP_HOST"
